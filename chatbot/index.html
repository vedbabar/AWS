<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Rule Based Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      height: 100vh;
    }

    .chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
    }

    .chat-container {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 300px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: none;
      overflow: hidden;
    }

    .chat-header {
      background: #007bff;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    .chat-box {
      height: 300px;
      padding: 10px;
      overflow-y: auto;
      background: #fafafa;
    }

    .message {
      margin: 8px 0;
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #e0e0e0;
      color: black;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .input-area button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="chat-btn" onclick="toggleChat()">💬</button>

  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      College Help Bot
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hello! Ask me something.
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>

    function toggleChat() {
      let chat = document.getElementById("chatContainer");

      if(chat.style.display === "block") {
        chat.style.display = "none";
      }
      else {
        chat.style.display = "block";
      }
    }

    function addMessage(text, sender) {

      let chatBox = document.getElementById("chatBox");

      let msg = document.createElement("div");

      msg.classList.add("message");
      msg.classList.add(sender);

      msg.innerText = text;

      chatBox.appendChild(msg);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getBotReply(input) {

      input = input.toLowerCase();

      if(input.includes("hello") || input.includes("hi")) {
        return "Hello Student!";
      }

      else if(input.includes("admission")) {
        return "Admissions are open till next month.";
      }

      else if(input.includes("fees")) {
        return "The course fees are around Rs. 50,000 per year.";
      }

      else if(input.includes("courses")) {
        return "We offer BTech, MTech and MBA courses.";
      }

      else if(input.includes("contact")) {
        return "You can contact us at 9876543210.";
      }

      else if(input.includes("bye")) {
        return "Goodbye! Have a nice day.";
      }

      else {
        return "Sorry, I don't understand that.";
      }
    }

    function sendMessage() {

      let inputField = document.getElementById("userInput");

      let userText = inputField.value.trim();

      if(userText === "") return;

      addMessage(userText, "user");

      let botReply = getBotReply(userText);

      setTimeout(() => {
        addMessage(botReply, "bot");
      }, 500);

      inputField.value = "";
    }

    document.getElementById("userInput")
      .addEventListener("keypress", function(event) {

      if(event.key === "Enter") {
        sendMessage();
      }
    });

  </script>

</body>
</html>
